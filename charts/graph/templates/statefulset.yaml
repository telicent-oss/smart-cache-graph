apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: {{ include "graph.fullname" . }}
  namespace: {{ include "graph.namespace" . | quote }}
  labels:
    {{- include "graph.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations: 
    {{- toYaml . | nindent 4 }}
  {{- end }}

spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "graph.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
      {{- include "graph.labels" . | nindent 8 }}
      {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      annotations:
        {{- if .Values.metrics.enabled }}
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ .Values.metrics.service.port | quote }}
        prometheus.io/scrape: "true"
        {{- end }}
        checksum/configEnv: {{ include (print $.Template.BasePath "/configmap-env.yaml") . | sha256sum }}
        checksum/configFuseki: {{ include (print $.Template.BasePath "/configmap-fuseki.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    
    spec:
      serviceAccountName: {{ include "graph.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}

      {{- $pullSecret := .Values.global.imagePullSecrets | default .Values.image.pullSecrets }}
      {{- with $pullSecret }}
      imagePullSecrets:
        {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- if .Values.initContainers }}
      initContainers:
      {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: {{ include "graph.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        resources: {{- toYaml .Values.resources | nindent 10 }}
        securityContext: {{- toYaml .Values.containerSecurityContext | nindent 10 }}

        args:
          - --config
          - /fuseki/config/config.ttl

        {{- if .Values.extraEnvVars }}
        env:
        {{- range .Values.extraEnvVars }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ include "graph.envConfigMapName" . }}
            optional: true

        ports:
        - name: http
          protocol: TCP
          containerPort: 3030

        {{- if .Values.metrics.enabled }}
        - name: metrics
          protocol: TCP
          containerPort: {{ .Values.metrics.service.port }}
        {{- end }}
        
        readinessProbe:
          httpGet:
            path: /$/ping
            port: 3030
            scheme: HTTP
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          successThreshold: {{ .Values.readinessProbe.successThreshold }}
        livenessProbe:
          httpGet:
            path: /$/ping
            port: 3030
            scheme: HTTP
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.livenessProbe.failureThreshold }}

        volumeMounts:
        - name: fuseki-config-volume
          mountPath: /fuseki/config
        - name: datasets-volume
          mountPath: /fuseki/databases
        - name: backups-volume
          mountPath: /fuseki/backups  
        - name: kafka-auth-config
          mountPath: /app/config/kafka-auth/
          
        {{- if .Values.global.truststore.existingSecret }}
        - name: java-truststore
          mountPath: {{ .Values.global.truststore.mountPath | default "/app/config/truststore" }}
        {{- end }}
        {{- with .Values.extraVolumeMounts }}
          {{- toYaml . | nindent 12 }}
        {{- end }}

      {{- with .Values.sidecars }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      - name: fuseki-config-volume
        configMap:
            name: {{ include "graph.fusekiConfigMapName" . }}
      - name: kafka-auth-config
        secret:
        {{- if .Values.global.kafka.existingConfigSecretName }}
          secretName: {{ .Values.global.kafka.existingConfigSecretName }}
        {{- else }}
          secretName: {{ include "graph.fullname" . }}-kafka-config
        {{- end }}
      {{- if .Values.global.truststore.existingSecret }}
      - name: java-truststore
        secret:
          secretName: {{ .Values.global.truststore.existingSecret }}
      {{- end }}
      {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

  volumeClaimTemplates:
  - metadata:
      name: datasets-volume
      labels:
        {{- include "graph.labels" . | nindent 8 }}
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
            storage: {{ .Values.persistentVolumeClaims.datasetsVolume.size }}
      storageClassName: {{ .Values.persistentVolumeClaims.datasetsVolume.storageClass }}
  - metadata:
      name: backups-volume
      labels:
        {{- include "graph.labels" . | nindent 8 }}
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
            storage: {{ .Values.persistentVolumeClaims.backupsVolume.size }}
      storageClassName: {{ .Values.persistentVolumeClaims.backupsVolume.storageClass }}
