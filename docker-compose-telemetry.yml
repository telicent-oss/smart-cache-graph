# Brings up Smart Cache Graph together with Prometheus and Grafana so both the
# Java agent Prometheus exporter and Fuseki's native metrics endpoint can be inspected.
#
# Requires the docker-build.sh script to have been called first.

services:

  smart-cache-graph:
    image: smart-cache-graph:main
    container_name: smart-cache-graph
    environment:
      JAVA_OPTIONS: -Xmx2048m -Xms2048m
      JWKS_URL: disabled
      ENABLE_LABELS_QUERY: "true"
      FUSEKI_FMOD_OTEL: "true"
      OTEL_SERVICE_NAME: smart-cache-graph
      OTEL_METRICS_EXPORTER: prometheus
      OTEL_TRACES_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_EXPORTER_PROMETHEUS_HOST: 0.0.0.0
      OTEL_EXPORTER_PROMETHEUS_PORT: 9464
    command:
      - --config
      - /fuseki/config/config-abac-local-with-data.ttl
      - --metrics
    ports:
      - "127.0.0.1:3030:3030"
      - "127.0.0.1:9466:9464"
    volumes:
      - scg-logs:/fuseki/logs
      - scg-data:/fuseki/databases
      - ./scg-docker/mnt/config:/fuseki/config:ro
      - scg-backups:/fuseki/backups
    networks:
      - scg-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: scg-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2d
      - --web.enable-lifecycle
    depends_on:
      - smart-cache-graph
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./telemetry/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - scg-net

  grafana:
    image: grafana/grafana:11.1.4
    container_name: scg-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/smart-cache-graph-telemetry.json
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./telemetry/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./telemetry/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - scg-net

volumes:
  scg-logs:
    driver: local
  scg-data:
    driver: local
  scg-backups:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  scg-net:
